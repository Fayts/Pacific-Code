# Déploiement sur le VPS : le conteneur rejoint le réseau du projet
# Claude-IA pour être joignable par Caddy sous le nom « pacific-code ».
services:
  pacific-code:
    build:
      context: .
      args:
        # Mode réel : Supabase Cloud (org dédiée « Pacific Code »).
        NEXT_PUBLIC_DATA_MODE: supabase
        NEXT_PUBLIC_SITE_URL: https://pacific-code.duckdns.org
        NEXT_PUBLIC_SUPABASE_URL: https://bpzoluxnpkdrkmodderi.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_Vya9ifYhuN_joeCG8rWz8w__dByJasd
    image: pacific-code
    container_name: pacific-code
    # Clés IA (agent d'onboarding + assistant) : déclarées dans
    # /root/pacific-code.env — HORS du dossier déployé, pour survivre aux
    # redéploiements. Sans fichier : mode démonstration, aucune clé requise.
    # Contenu attendu :
    #   AI_PROVIDER=anthropic
    #   ANTHROPIC_API_KEY=sk-ant-…
    env_file:
      - path: /root/pacific-code.env
        required: false
    restart: unless-stopped
    networks:
      - claude-ia_default

networks:
  claude-ia_default:
    external: true
